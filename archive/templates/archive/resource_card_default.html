{% load archive_extras %}
<li class="card card--resource">
  <h3 class="card__title">
    <a class="card__link"
       href="{% url 'archive:resource_detail' resource.id %}">
      {{ resource.title }}
    </a>
  </h3>
  <p class="card__detail">
    <time datetime="{{ resource.duration.seconds|timecode:"iso8601" }}">
      {{ resource.duration }}
    </time>
    <br>
    {{ resource.media_type }}
    <br>
    <time datetime="{{ resource.pub_date|date:"Y-m-d" }}">
      {{ resource.pub_date|date:"SHORT_DATE_FORMAT" }}
    </time>
  </p>
</li>
