{% load archive_extras %}
<li class="card card--resource">
  <h3 class="card__title">
    <a class="card__link"
       href="{% url 'archive:resource_detail' resource.id %}">
      {{ resource.title_t }}
    </a>
  </h3>
  <p class="card__detail">
    <time datetime="{{ resource.duration_i|timecode:"iso8601" }}">
      {{ resource.duration_i|timecode }}
    </time>
    <br>
    {{ resource.media_type_s }}
  </p>
</li>
