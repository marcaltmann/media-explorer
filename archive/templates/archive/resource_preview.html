<li class="card card--resource">
  <h3 class="card__title">
    <a class="card__link"
       href="">
      {{ resource.title_s }}
    </a>
  </h3>
  <p class="card__detail">
    {{ resource.duration }}
    <br>
    {{ resource.media_type_s }}
    <br>
    {{ resource.pub_date_dt|date:"SHORT_DATE_FORMAT" }}
  </p>
</li>
